cv:
  name: Jesús Falcón-Barroso
  label: Associate Professor / Investigador Científico de OPI
  email: jesus.falcon.barroso@iac.es
  location: Instituto de Astrofísica de Canarias
  image: ""
  summary: 

# Research Line: I lead studies on the processes that control the formation and evolution of galaxies
# using integral field spectrographs. My research has revealed important relationships between the
# dynamic properties of the inner and outer regions, variations in the age and metallicity of stellar
# populations, and the link between the kinematics of stars and the metal enrichment of the local
# interstellar medium in galaxies. All of this has contributed to establishing the level of secular
# evolution experienced by these galaxies.

# Academic and Research History: I hold a Bachelor’s degree in Physics from the University of La
# Laguna (1999) and a PhD from the University of Nottingham (1999-2002). I was a postdoctoral
# researcher at the Particle Physics and Astronomy Research Council in the same university (2002-
# 2003). I held postdoctoral positions with the EURO3D network (2003-2005) and NOVA (2005-2006)
# at Leiden Observatory (Netherlands). I served as a Research Fellow at the European Space Agency
# in the Netherlands (2006-2009) and was a Ram´on y Cajal researcher (2009-2014) at the Instituto de
# Astrof´sica de Canarias (IAC). Currently, I am Investigador Cient´ıfico (Associate Professor) and,
# between January 2021 and March 2025, Head of Research at IAC, managing the activity of 230
# researchers at our institute.

# Publications/Impact: H-index = 72. I am the author of 261 articles in high-impact journals (Q1),
# with 63 of them (15/26/22) as the first/second/third author. Fifty percent of the second/third
# author articles were published by researchers directly supervised by me. The total number of
# citations exceeds 25,000, with an average of over 1,000 citations per year. Three of these articles,
# where I am the first/second/third author, are among the top 1% most cited in the field of galaxy
# formation since 1970. I have also been invited to write a review article for volume 63 (2025) of
# the prestigious journal Annual Reviews of Astronomy and Astrophysics, on galaxy assembly using
# combined dynamical and stellar population models.

# Research Project Leadership: I have been the Principal Investigator (PI) of the IAC group ”TRACES
# of Galaxy Evolution” (2011-2018) with 17 members. I was the PI of the coordinated project ”Real
# and Virtual Galaxies: The Formation of Galaxies Throughout Cosmic History” (AYA2013-48226-
# C3-1-P and AYA2016-77237-C3-1-P) with 36 members. Additionally, I am part of forefront research
# teams in the field of integral-field spectroscopy, leading the analysis of stellar kinematics and populations
# in several projects (SAURON, CALIFA, MILES, Fornax3D, GECKOS). Currently, I am the
# PI of the international WEAVE-Apertif project, with over 80 associated researchers.

# Reviewer Roles: I have been a referee for Q1 journals such as Astronomy & Astrophysics, Astrophysical
# Journal, and Monthly Notices of the Royal Astronomical Society. I chaired the B2
# panel of the OPC of the European Southern Observatory (2014-2015) and have been a reviewer for
# ANEP, as well as an external reviewer for the Netherlands Organisation for Scientific Research,
# the Royal Astronomical Society, FONDECYT, and FONCyT. I have served as a member of the
# advisory committee of the Nordic Optical Telescope and the oversight committee of the Gran
# Telescopio Canarias. I have also carried out activities as an external reviewer for internal promotion
# positions at universities such as St. Andrews and Western Australia. I have chaired over 100
# selection processes for predoctoral, postdoctoral, and Senior Scientist positions at IAC.

# Presentations/Conferences: I have delivered numerous oral presentations at national and international
# conferences, including two invitations to International Astronomical Union symposia. I
# have been invited to give seminars and colloquia at research centers and conferences in Europe,
# the United States (e.g., Institute for Advanced Study, Princeton), Australia (e.g., Mt. Stromlo Observatory),
# and the Middle East (IPM). I organized a symposium for the European Astronomical
# Society and served on the SOC/LOC of 11 international conferences.

# Supervision/Teaching: I have supervised 3 postdocs and 9 PhD theses, as well as 15 undergraduate
# and master’s research projects. I have participated in 19 thesis committees (7 international).
# I was a lecturer in Extragalactic Physics for the Master’s in Astrophysics at the University of La
# Laguna (2016-2019) and demonstrator at the University of Nottingham (2000-2021).

# Awards/Achievements: I received the ”Group Achievement Award” in 2012 from the Royal Astronomical
# Society of the United Kingdom to the SAURON research project, leading work on the
# kinematics and stellar populations of spiral galaxies. I am the first/second author of 7 (3/4) of the
# 38 articles (Q1) published by the project. I hold the I3 Certificate (since 2013) from the Ministry
# of Science and Innovation. I have obtained four positive ”Sexenios” awarded by the Comisi´on
# Nacional Evaluadora de la Actividad Investigadora (CNEAI).

